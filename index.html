<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Guest Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; min-width: 375px; }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }
    header h1 { font-size: 1.4rem; color: #a78bfa; letter-spacing: 1px; }
    header span { font-size: 0.8rem; color: #6b7280; }

    .tabs {
      display: flex;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    .tab-btn {
      flex: 1; padding: 14px; background: none; border: none;
      color: #6b7280; font-size: 0.95rem; cursor: pointer;
      transition: all 0.2s; border-bottom: 3px solid transparent;
    }
    .tab-btn.active { color: #a78bfa; border-bottom-color: #a78bfa; background: #16213e; }
    .tab-btn:hover:not(.active) { color: #c4b5fd; background: #1e1e3a; }

    .view { display: none; padding: 24px; max-width: 800px; margin: 0 auto; }
    .view.active { display: block; }

    #scanner-container {
      border-radius: 16px; overflow: hidden; border: 2px solid #2a2a4a;
      background: #000; max-width: 480px; margin: 0 auto 20px;
    }
    #reader { width: 100%; }

    .scanner-controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }

    .btn {
      padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .btn-primary  { background: #7c3aed; color: #fff; }
    .btn-primary:hover  { background: #6d28d9; }
    .btn-secondary { background: #1e1e3a; color: #a78bfa; border: 1px solid #3b3b6b; }
    .btn-secondary:hover { background: #2a2a4a; }
    .btn-danger   { background: #dc2626; color: #fff; }
    .btn-danger:hover   { background: #b91c1c; }

    #scan-result {
      max-width: 480px; margin: 0 auto; padding: 16px; border-radius: 12px;
      text-align: center; font-size: 1.1rem; font-weight: 600;
      display: none; animation: fadeIn 0.3s ease;
    }
    #scan-result.success { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
    #scan-result.error   { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    #scan-result.warning { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }

    .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters input {
      flex: 1; min-width: 180px; padding: 10px 14px;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 8px; color: #e0e0e0; font-size: 0.9rem;
    }
    .filters input:focus { outline: none; border-color: #7c3aed; }
    .filters select {
      padding: 10px 14px; background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 8px; color: #e0e0e0; font-size: 0.9rem; cursor: pointer;
    }
    .filters select:focus { outline: none; border-color: #7c3aed; }

    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 100px; background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .stat-card .num   { font-size: 1.8rem; font-weight: 700; color: #a78bfa; }
    .stat-card .label { font-size: 0.75rem; color: #6b7280; margin-top: 4px; }

    .guest-table { width: 100%; border-collapse: collapse; }
    .guest-table th {
      background: #1a1a2e; padding: 12px 14px; text-align: left;
      font-size: 0.8rem; color: #6b7280; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid #2a2a4a;
    }
    .guest-table td {
      padding: 12px 14px; border-bottom: 1px solid #1e1e3a;
      font-size: 0.9rem; vertical-align: middle;
    }
    .guest-table tr:hover td { background: #1a1a2e; }

    /* Mobile: all columns visible, table scrolls horizontally */
    @media (max-width: 600px) {
      .view { padding: 16px 12px; }
      .stats { gap: 8px; }
      .stat-card { padding: 10px 6px; min-width: 70px; }
      .stat-card .num { font-size: 1.4rem; }
      .filters { gap: 8px; }
      .filters input, .filters select { font-size: 0.85rem; padding: 8px 10px; }
      #guest-list-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .guest-table th, .guest-table td { padding: 10px 8px; font-size: 0.78rem; white-space: nowrap; }
    }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-vip     { background: #4c1d95; color: #c4b5fd; }
    .badge-regular { background: #1e3a5f; color: #93c5fd; }
    .badge-arrived { background: #064e3b; color: #6ee7b7; }
    .badge-pending { background: #1c1c1c; color: #9ca3af; border: 1px solid #374151; }

    .btn-mark {
      padding: 6px 14px; font-size: 0.8rem; border-radius: 6px;
      border: none; cursor: pointer; font-weight: 600; transition: all 0.2s;
    }
    .btn-mark.arrived { background: #064e3b; color: #6ee7b7; cursor: default; }
    .btn-mark.pending { background: #7c3aed; color: #fff; }
    .btn-mark.pending:hover { background: #6d28d9; }

    .loading { text-align: center; padding: 40px; color: #6b7280; }
    .empty   { text-align: center; padding: 40px; color: #6b7280; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(124,58,237,0.7); transform: scale(1); }
      70%  { box-shadow: 0 0 0 18px rgba(124,58,237,0); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); transform: scale(1); }
    }
    #btn-scan { animation: pulse 1.8s infinite; }

    .scan-icon { font-size: 3rem; margin-bottom: 12px; }
    .manual-entry { max-width: 480px; margin: 0 auto; }
    .manual-entry input {
      width: 100%; padding: 10px 14px; margin-bottom: 10px;
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 8px; color: #e0e0e0; font-size: 0.9rem;
    }
    .manual-entry input:focus { outline: none; border-color: #7c3aed; }

    .section-title { font-size: 0.8rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <h1>&#x1F3AB; Event Guest Scanner</h1>
  <span id="event-name-display">No event loaded</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('scanner')">&#x1F4F7; Scanner</button>
  <button class="tab-btn" onclick="switchTab('guests')">&#x1F465; Guest List</button>
</div>

<!-- SCANNER TAB -->
<div id="view-scanner" class="view active">
  <div id="scanner-container">
    <div id="reader"></div>
  </div>
  <div class="scanner-controls">
    <button class="btn btn-primary" id="btn-scan" onclick="startScanner()" style="font-size:1.1rem;padding:14px 36px;letter-spacing:1px">&#x1F4F7; Scan QR Code</button>
    <button class="btn btn-danger" id="btn-stop" onclick="stopScanner()" style="display:none;font-size:1.1rem;padding:14px 36px">&#x23F9; Stop Camera</button>
  </div>
  <div id="scan-result"></div>
  <div style="margin-top:24px;">
    <p class="section-title">Or enter code manually</p>
    <div class="manual-entry">
      <input type="text" id="manual-input" placeholder="Enter 7-character ticket code..." maxlength="7" style="text-transform:uppercase" onkeydown="if(event.key==='Enter') manualCheck()" />
      <button class="btn btn-secondary" style="width:100%" onclick="manualCheck()">Check In</button>
    </div>
  </div>
</div>

<!-- GUESTS TAB -->
<div id="view-guests" class="view">
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
    <div class="stat-card"><div class="num" id="stat-arrived">0</div><div class="label">Arrived</div></div>
    <div class="stat-card"><div class="num" id="stat-pending">0</div><div class="label">Pending</div></div>
    <div class="stat-card"><div class="num" id="stat-vip">0</div><div class="label">VIP</div></div>
  </div>
  <div class="filters">
    <input type="text" id="search-input" placeholder="Search by name or ID..." oninput="renderGuests()" />
    <select id="filter-status" onchange="renderGuests()">
      <option value="all">All Status</option>
      <option value="pending">Pending</option>
      <option value="arrived">Arrived</option>
    </select>
    <select id="filter-type" onchange="renderGuests()">
      <option value="all">All Types</option>
      <option value="vip">VIP</option>
      <option value="regular">Regular</option>
    </select>
    <button class="btn btn-secondary" onclick="refreshGuests()">&#x21BB; Refresh</button>
  </div>
  <div id="guest-list-container">
    <div class="loading">Loading guests...</div>
  </div>
</div>

<!-- CONFIG TAB REMOVED -->

<script>
  let guests = [];
  let scanner = null;
  let scanning = false;

  // Auto-detect API base (works locally with vercel dev and on Vercel)
  const API = '';

  // ── Tab switching ──────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    event.currentTarget.classList.add('active');
    if (tab !== 'scanner') stopScanner();
    if (tab === 'guests') { updateStats(); renderGuests(); }
  }

  // ── Scanner ────────────────────────────────────────────────
  function startScanner() {
    if (scanning) return;
    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    ).then(() => {
      scanning = true;
      document.getElementById('btn-scan').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'inline-block';
    }).catch(err => showResult('Camera error: ' + err, 'error'));
  }

  function stopScanner() {
    if (scanner && scanning) {
      scanner.stop().then(() => { scanner.clear(); scanning = false; });
    }
    document.getElementById('btn-scan').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
  }

  function onScanSuccess(code) {
    stopScanner();
    checkIn({ token: code.trim() });
  }

  function manualCheck() {
    const val = document.getElementById('manual-input').value.trim().toUpperCase();
    if (!val) return;
    if (val.length !== 7) { showResult('Enter the 7-character code from the ticket', 'error'); return; }
    // Look up guest by code
    const match = guests.find(g => (g.code || '').toUpperCase() === val);
    if (!match) { showResult('Code not found: ' + val, 'error'); return; }
    showConfirm(match);
  }

  // ── Confirmation modal for manual check-in ─────────────────
  function showConfirm(guest) {
    const existing = document.getElementById('confirm-modal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'confirm-modal';
    modal.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;
      align-items:center;justify-content:center;z-index:1000;animation:fadeIn 0.2s ease;
    `;
    modal.innerHTML = `
      <div style="background:#1a1a2e;border:1px solid #3b3b6b;border-radius:16px;padding:28px;max-width:360px;width:90%;text-align:center;">
        <div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
        <div style="color:#fcd34d;font-size:1rem;font-weight:700;margin-bottom:6px;">Manual Check-In</div>
        <div style="color:#e0e0e0;font-size:1.1rem;font-weight:600;margin-bottom:4px;">${esc(guest.name)}</div>
        <div style="color:#6b7280;font-size:0.85rem;margin-bottom:20px;">
          ${guest.type === 'vip' ? '<span style="color:#c4b5fd">⭐ VIP</span>' : 'Regular'} &nbsp;|&nbsp; ID: ${esc(guest.id)}
        </div>
        <div style="color:#9ca3af;font-size:0.8rem;margin-bottom:20px;">
          You are manually checking in this guest.<br>This action will be recorded with the current time.
        </div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button onclick="document.getElementById('confirm-modal').remove();document.getElementById('manual-input').value='';"
            style="padding:10px 22px;border-radius:8px;border:1px solid #3b3b6b;background:#1e1e3a;color:#a78bfa;font-weight:600;cursor:pointer;">
            Cancel
          </button>
          <button onclick="confirmManualCheckIn('${esc(guest.id)}')"
            style="padding:10px 22px;border-radius:8px;border:none;background:#d97706;color:#fff;font-weight:600;cursor:pointer;">
            Confirm Check-In
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }

  async function confirmManualCheckIn(id) {
    document.getElementById('confirm-modal').remove();
    document.getElementById('manual-input').value = '';
    await checkIn({ code: guests.find(g => g.id === id)?.code }, true);
  }

  // ── Check-in logic ─────────────────────────────────────────
  async function checkIn(payload, isManual = false) {
    if (!payload) return;
    try {
      const res = await fetch(API + '/api/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...payload, manual: isManual }),
      });
      const data = await res.json();
      if (!res.ok) { showResult(data.error || 'Error', 'error'); return; }

      if (data.status === 'already_checked_in') {
        showResult('⚠️ Already checked in: ' + data.guest.name + ' at ' + formatTime(data.guest.arrived_at), 'warning');
      } else if (isManual) {
        showResult('✓ Manual check-in: ' + data.guest.name + (data.guest.type === 'vip' ? ' ⭐ VIP' : ''), 'warning');
      } else {
        showResult('✓ Welcome, ' + data.guest.name + (data.guest.type === 'vip' ? ' ⭐ VIP' : '') + '!', 'success');
      }
      await loadGuests();
      updateStats();
      if (document.getElementById('view-guests').classList.contains('active')) renderGuests();
    } catch (err) {
      showResult('Network error', 'error');
    }
  }

  function formatTime(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleTimeString();
  }

  function showResult(msg, type) {
    const el = document.getElementById('scan-result');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  // ── Guest list rendering ───────────────────────────────────
  function renderGuests() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const type   = document.getElementById('filter-type').value;

    let filtered = guests.filter(g => {
      const matchSearch = g.name.toLowerCase().includes(search);
      const matchStatus = status === 'all' || (status === 'arrived' ? g.arrived : !g.arrived);
      const matchType   = type === 'all' || g.type === type;
      return matchSearch && matchStatus && matchType;
    });

    const container = document.getElementById('guest-list-container');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty">No guests match your filters.</div>';
      return;
    }

    let html = '<table class="guest-table"><thead><tr>'
      + '<th>Name</th><th>Type</th><th>Status</th><th class="col-time">Time</th>'
      + '</tr></thead><tbody>';

    filtered.forEach(g => {
      html += `<tr>
        <td>${esc(g.name)}</td>
        <td><span class="badge badge-${g.type}">${g.type.toUpperCase()}</span></td>
        <td><span class="badge ${g.arrived ? 'badge-arrived' : 'badge-pending'}">${g.arrived ? 'Arrived' : 'Pending'}</span></td>
        <td class="col-time" style="color:#6b7280;font-size:0.8rem">${formatTime(g.arrived_at)}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function updateStats() {
    document.getElementById('stat-total').textContent   = guests.length;
    document.getElementById('stat-arrived').textContent = guests.filter(g => g.arrived).length;
    document.getElementById('stat-pending').textContent = guests.filter(g => !g.arrived).length;
    document.getElementById('stat-vip').textContent     = guests.filter(g => g.type === 'vip').length;
  }

  async function refreshGuests() {
    document.getElementById('guest-list-container').innerHTML = '<div class="loading">Refreshing...</div>';
    await loadGuests();
    updateStats();
    renderGuests();
  }

  // ── Persistence ────────────────────────────────────────────
  async function loadGuests() {
    try {
      const res = await fetch(API + '/api/guests');
      const data = await res.json();
      guests = Array.isArray(data) ? data : [];
    } catch (err) {
      console.error('Could not load guests', err);
      guests = [];
    }
  }

  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  (async () => { await loadGuests(); updateStats(); })();
</script>
</body>
</html>
